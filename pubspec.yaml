name: jlpt_master
description: "JLPT Japanese Learning App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  go_router: ^17.0.0
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  firebase_analytics: ^12.0.4
  firebase_crashlytics: ^5.0.4
  http: ^1.2.1
  csv: ^6.0.0
  shared_preferences: ^2.5.3
  flutter_animate: ^4.5.2
  flutter_svg: ^2.2.0
  animations: ^2.0.11
  url_launcher: ^6.3.2
  google_sign_in: ^7.1.0
  sign_in_with_apple: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  ios: true
  android: false
  image_path: assets/icons/app_icon.png
  remove_alpha_ios: true